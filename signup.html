<!DOCTYPE html>
<html>
<head>
    <title>Signup - Community Hero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Create Account</h1>

<form id="signupForm">

    <input
        type="text"
        id="name"
        placeholder="Enter Name"
        required
    >

    <input
        type="email"
        id="email"
        placeholder="Enter Email"
        required
    >

    <input
        type="password"
        id="password"
        placeholder="Enter Password"
        required
    >

    <button type="submit">
        Signup
    </button>

</form>

<p>
    Already have an account?
    <a href="login.html">Login</a>
</p>

<script src="signup.js"></script>

</body>
</html>
