<!DOCTYPE html>
<html>
<head>
    <title>Login - Community Hero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Login</h1>

<form id="loginForm">

    <input
        type="email"
        id="email"
        placeholder="Enter Email"
        required
    >

    <input
        type="password"
        id="password"
        placeholder="Enter Password"
        required
    >

    <button type="submit">
        Login
    </button>

</form>

<p>
    Don't have an account?
    <a href="signup.html">Signup</a>
</p>

<script src="login.js"></script>

</body>
</html>
